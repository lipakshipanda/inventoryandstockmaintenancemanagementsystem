<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Profile — InvenTrack</title><link rel="stylesheet" href="css/style.css">
<style>.profile-grid{display:grid;grid-template-columns:280px 1fr;gap:24px}@media(max-width:768px){.profile-grid{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="app-shell">
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <div class="topbar"><div class="topbar-left"><h1>My Profile</h1><div class="breadcrumb">Manage your account</div></div></div>
    <div class="page-content fade-in">
      <div class="profile-grid">
        <div>
          <div class="card" style="text-align:center">
            <div class="avatar-wrap" onclick="document.getElementById('avatar-input').click()" style="margin:0 auto 16px">
              <span id="avatar-initials"></span>
              <img id="avatar-img" src="" alt="" style="display:none">
            </div>
            <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
            <div style="font-size:16px;font-weight:700;color:var(--text)" id="profile-name-display"></div>
            <div id="profile-role-badge" class="badge" style="margin:8px auto 4px;display:inline-flex"></div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:6px">Click avatar to change photo</div>
          </div>
          <div class="salary-card">
            <p style="color:rgba(255,255,255,0.5);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Monthly Salary</p>
            <h3 id="salary-display">₹0</h3>
            <p id="salary-note" style="margin-top:4px"></p>
          </div>
          <div class="card" style="margin-top:16px">
            <div class="card-title" style="margin-bottom:12px">My Activity</div>
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px;color:var(--text-muted)">Sales recorded</span>
              <span style="font-size:13px;font-weight:600" id="my-sales-count">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:13px;color:var(--text-muted)">Total revenue</span>
              <span style="font-size:13px;font-weight:600" id="my-revenue">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:8px 0">
              <span style="font-size:13px;color:var(--text-muted)">Member since</span>
              <span style="font-size:13px;font-weight:600" id="member-since">—</span>
            </div>
          </div>
        </div>
        <div>
          <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('info',this)">Personal Info</button>
            <button class="tab-btn" onclick="switchTab('password',this)">Change Password</button>
          </div>
          <div class="tab-content active" id="tab-info">
            <div class="card">
              <div class="card-title" style="margin-bottom:20px">Update Personal Information</div>
              <div class="form-grid-2">
                <div class="form-group"><label>Full Name</label><input type="text" id="edit-name"></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="edit-email"></div>
                <div class="form-group full-col"><label>Address</label><input type="text" id="edit-address" placeholder="Your address"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="edit-phone" placeholder="Phone number"></div>
                <div class="form-group"><label>Department</label><input type="text" id="edit-department" placeholder="Department"></div>
              </div>
              <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
              <div id="info-msg" style="margin-top:12px;font-size:13px"></div>
            </div>
          </div>
          <div class="tab-content" id="tab-password">
            <div class="card">
              <div class="card-title" style="margin-bottom:20px">Change Password</div>
              <div class="form-group"><label>Current Password</label><input type="password" id="current-password" placeholder="Current password"></div>
              <div class="form-group"><label>New Password</label><input type="password" id="new-password" placeholder="Min 4 characters"></div>
              <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm-password" placeholder="Confirm new password"></div>
              <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
              <div id="pwd-msg" style="margin-top:12px;font-size:13px"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/sidebar.js"></script>
<script src="js/profile.js"></script>
</body></html>
