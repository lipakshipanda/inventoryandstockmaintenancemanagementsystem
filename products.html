<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Products — InvenTrack</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="app-shell">
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h1>Products</h1><div class="breadcrumb">Manage inventory products</div></div>
      <div class="topbar-right"><button class="btn btn-primary btn-sm" id="add-btn" onclick="toggleForm()">+ Add Product</button></div>
    </div>
    <div class="page-content fade-in">
      <div class="card" id="product-form" style="display:none;margin-bottom:20px">
        <div class="card-title" style="margin-bottom:16px">Add New Product</div>
        <div class="form-grid-2">
          <div class="form-group"><label>Product Name *</label><input id="p-name" type="text" placeholder="Enter product name"></div>
          <div class="form-group"><label>Category *</label><input id="p-category" type="text" placeholder="e.g. Electronics, Furniture"></div>
          <div class="form-group"><label>Quantity</label><input id="p-quantity" type="number" min="0" value="0"></div>
          <div class="form-group"><label>Price per Unit (₹)</label><input id="p-price" type="number" min="0" step="0.01" placeholder="0.00"></div>
          <div class="form-group"><label>Reorder Level</label><input id="p-reorder" type="number" min="0" value="10"></div>
          <div class="form-group"><label>Expiry Date (optional)</label><input id="p-expiry" type="date"></div>
          <div class="form-group full-col"><label>Description (optional)</label><input id="p-description" type="text" placeholder="Brief description"></div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-success" id="save-btn" onclick="addProduct()">Save Product</button>
          <button class="btn btn-outline" onclick="toggleForm()">Cancel</button>
        </div>
        <div id="p-msg" style="margin-top:12px"></div>
      </div>
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">All Products</div><div class="card-subtitle" id="prod-count"></div></div>
          <input class="search-input" id="prod-search" placeholder="Search by name or category..." oninput="filterProducts()">
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Category</th><th>Qty / Reorder</th><th>Price</th><th>Total Value</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="products-table"><tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/sidebar.js"></script>
<script src="js/products.js"></script>
</body></html>
