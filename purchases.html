<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Purchases — InvenTrack</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="app-shell">
  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left"><h1>Purchases</h1><div class="breadcrumb">Record incoming stock</div></div>
    </div>
    <div class="page-content fade-in">
      <div id="purchase-form-card" class="card" style="margin-bottom:24px">
        <div class="card-title" style="margin-bottom:16px">Record New Purchase</div>
        <div class="form-grid-2">
          <div class="form-group full-col"><label>Select Product</label>
            <select id="purchase-product" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font)"></select>
          </div>
          <div class="form-group"><label>Quantity Received</label><input id="purchase-qty" type="number" min="1" value="1"></div>
          <div class="form-group"><label>Cost Price per Unit (₹)</label><input id="purchase-cost" type="number" min="0" step="0.01" placeholder="0.00"></div>
          <div class="form-group full-col"><label>Supplier Name</label><input id="purchase-supplier-name" type="text" placeholder="Enter supplier name"></div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-success" onclick="recordPurchase()">Record Purchase ✓</button>
          <span id="purchase-msg" style="font-size:13px"></span>
        </div>
      </div>

     

      <div class="card">
        <div class="card-header">
          <div class="card-title">Purchase History</div>
          <span id="purchase-count" style="font-size:13px;color:var(--text-muted)"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Product</th><th>Qty</th><th>Cost/Unit</th><th>Total Cost</th><th>Supplier</th><th>Date</th><th>By</th></tr></thead>
            <tbody id="purchases-table"><tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:24px">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/sidebar.js"></script>
<script src="js/purchases.js"></script>
</body></html>
